<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Desafio 2 - Feriados Nacionais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; padding: 50px 0; } /* Cor de fundo e respiro nas bordas */
        .table-container {
            background: white; /* Cartão branco para a tabela */
            padding: 30px; 
            border-radius: 15px; /* Cantos arredondados */
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); /* Sombra leve */
        }
        /* Estiliza o cabeçalho da tabela com azul do Bootstrap */
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>

<body>

    <div class="container"> <div class="table-container">
            <h2 class="text-center mb-4">📅 Feriados Nacionais - 2024</h2>
            
            <table class="table table-hover"> <thead>
                    <tr> <th>Data</th>
                        <th>Nome do Feriado</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    </tbody>
            </table>
            
            <div id="loading" class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Buscando feriados...</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        // Função assíncrona para lidar com a espera da API
        async function buscarFeriados() {
            // Seleciona os elementos do HTML que vamos modificar
            const tabela = document.getElementById('corpo-tabela');
            const loading = document.getElementById('loading');

            try {
                // 'fetch' solicita os dados. 'await' espera a resposta da BrasilAPI
                const resposta = await fetch('https://brasilapi.com.br/api/feriados/v1/2024');
                
                // Converte a resposta bruta em um Array de objetos JavaScript
                const feriados = await resposta.json();

                // Após receber os dados, esconde o aviso de "Carregando"
                loading.style.display = 'none';

                // O 'forEach' percorre cada item (feriado) dentro do Array retornado
                feriados.forEach(feriado => {
                    
                    // document.createElement cria uma nova tag <tr> (linha da tabela) na memória
                    const linha = document.createElement('tr');

                    // A API manda a data como '2024-01-01'. 
                    // split('-') divide em ['2024', '01', '01']
                    // reverse() inverte para ['01', '01', '2024']
                    // join('/') une novamente como '01/01/2024'
                    const dataFormatada = feriado.date.split('-').reverse().join('/');

                    // Define o conteúdo HTML interno da nossa nova linha
                    // Usamos ${} para inserir os valores que vieram da API
                    linha.innerHTML = `
                        <td><strong>${dataFormatada}</strong></td>
                        <td>${feriado.name}</td>
                        <td><span class="badge bg-info text-dark">${feriado.type}</span></td>
                    `;

                    // 'appendChild' pega a linha que criamos e a "pendura" dentro do <tbody>
                    tabela.appendChild(linha);
                });

            } catch (erro) {
                // Caso a API falhe, exibe o erro no console e avisa o usuário
                console.error("Erro ao buscar API:", erro);
                loading.innerHTML = "<p class='text-danger'>Erro ao carregar feriados.</p>";
            }
        }

        // Evento que dispara a função assim que a janela (window) terminar de carregar
        window.onload = buscarFeriados;
    </script>

</body>  
</html>
